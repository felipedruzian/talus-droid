teleop_twist_joy_node:
  ros__parameters:
    require_enable_button: true
    enable_button: 6
    enable_turbo_button: 7
    axis_linear:
      x: 1
      y: -1
      z: -1
    scale_linear:
      x: -0.4
      y: 0.0
      z: 0.0
    scale_linear_turbo:
      x: -0.6
      y: 0.0
      z: 0.0
    axis_angular:
      yaw: 2
      pitch: -1
      roll: -1
    scale_angular:
      yaw: 1.2
      pitch: 0.0
      roll: 0.0
    scale_angular_turbo:
      yaw: 1.8
      pitch: 0.0
      roll: 0.0
    inverted_reverse: false
    publish_stamped_twist: false
